services:
  - type: web
    name: bajaj-bfhl
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USER_ID
        sync: false
      - key: EMAIL_ID
        sync: false
      - key: COLLEGE_ROLL_NUMBER
        sync: false
      - key: PORT
        value: 5000
